<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículo</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
     rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


    <div class="card" aria-labelledby="pageTitle">
      <h1>Cadastro de Veículo</h1>
      <p class="lead">Preencha os dados do veículo. Cada campos são obrigatórios.</p>

      <form id="vehicleForm" novalidate>
        <div class="grid">
          <div>
            <label for="modelo">Modelo</label>
            <input id="modelo" name="modelo" type="text" required placeholder="Ex: Gol" />
          </div>

          <div>
            <label for="marca">Marca</label>
            <input id="marca" name="marca" type="text" required placeholder="Ex:" />
          </div>

          <div>
            <label for="anoFabricacao">Ano de fabricação</label>
            <input id="anoFabricacao" name="anoFabricacao" type="number" min="1886" max="2100" required placeholder="EX:2020" />
          </div>

          <div>
            <label for="anoModelo">Ano do modelo</label>
            <input id="anoModelo" name="anoModelo" type="number" min="1886" max="2100" required placeholder="EX:2021" />
          </div>

          <div>
            <label for="cor">Cor</label>
            <input id="cor" name="cor" type="text" placeholder="Ex: Prata" />
          </div>

          <div>
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria">
              <option value="">Selecione</option>
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
              <option>E</option>
              <option>F</option>
            </select>
          </div>

          <div>
            <label for="combustivel">Combustível</label>
            <select id="combustivel" name="combustivel">
              <option value="">Selecione</option>
              <option>Gasolina</option>
              <option>Etanol</option>
              <option>Diesel</option>
              <option>Elétrico</option>
            </select>
          </div>

          <div>
            <label for="cambio">Câmbio</label>
            <select id="cambio" name="cambio">
              <option value="">Selecione</option>
              <option>Manual</option>
              <option>Automático</option>
            </select>
          </div>

          <div>
            <label for="quilometragem">Quilometragem (km)</label>
            <input id="quilometragem" name="quilometragem" type="number" min="0" placeholder="Ex: 45000" />
          </div>

          <div>
            <label for="preco">Preço (R$)</label>
            <input id="preco" name="preco" type="number" min="0" step="0.01" placeholder="Ex: 45000.00" />
          </div>

          <div class="full">
            <label for="imagem">Imagem do veículo</label>
            <input id="imagem" name="imagem" type="file" accept="image/*" />
            <div class="image-preview" id="imagePreview" aria-live="polite"></div>
          </div>

          <div class="full">
            <label for="descricao">Descrição</label>
            <select id="cambio" name="cambio">
              <option>="">Selecione</option>
              <option></option>
              <option></option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="reset" class="btn btn-ghost">Limpar</button>
          <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
      </form>
    </div>
</body>
</html>
