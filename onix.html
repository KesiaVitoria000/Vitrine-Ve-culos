!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Veículo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>


  <div class="container py-5">
  <div class="card mx-auto" style="max-width: 900px; border: 2px solid #ccc; background:#fff;">
    <div class="row no-gutters">
      <div class="col-md-6">
        <img src="img/veiculo-1.jpg" class="img-fluid" alt="Veículo">
      </div>
      <div class="col-md-6">
        <div class="card-body">
          <h3 class="card-title">Modelo X</h3>
          <p><strong>Marca:</strong> Marca Y</p>
          <p><strong>Ano fabricação:</strong> 2020</p>
          <p><strong>Ano modelo:</strong> 2021</p>
          <p><strong>Cor:</strong> Azul</p>
          <p><strong>Categoria:</strong> Sedan</p>
          <p><strong>Combustível:</strong> Gasolina</p>
          <p><strong>Câmbio:</strong> Automático</p>
          <p><strong>Quilometragem:</strong> 30.000 km</p>
          <p><strong>Preço:</strong> R$ 80.000</p>
          <p class="mt-3">Descrição completa do veículo...</p>
        </div>
      </div>
    </div>
  </div>
</div>
